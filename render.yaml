services:
  - type: web
    name: controle-veiculos
    env: node
    region: ohio
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: controle-veiculos-db
          property: connectionString

databases:
  - name: controle-veiculos-db
    region: ohio
    plan: free
    databaseName: controle_veiculos
