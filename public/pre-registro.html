<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pré-Registro - Oceânica</title>
<style>
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh;
    background:linear-gradient(135deg,#0a3622 0%,#145c3c 100%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Segoe UI',system-ui,sans-serif; padding:16px;
  }
  .card{
    background:#fff; border-radius:16px; padding:32px 28px;
    width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .card h1{ margin:0 0 4px; font-size:20px; color:#0a3622; text-align:center; }
  .card .sub{ margin:0 0 24px; font-size:13px; color:#8b93a1; text-align:center; }
  .card .campo{ margin-bottom:14px; }
  .card label{ display:block; font-size:12px; font-weight:600; color:#4a5568; margin-bottom:4px; }
  .card input,.card select{
    width:100%; padding:10px 12px; border:1px solid #d1d5db;
    border-radius:8px; font-size:14px; outline:none; transition:border-color .2s;
  }
  .card input:focus,.card select:focus{ border-color:#0a3622; box-shadow:0 0 0 3px rgba(10,54,34,.1); }
  .card button{
    width:100%; padding:12px; border:none; border-radius:8px;
    background:#0a3622; color:#fff; font-size:15px; font-weight:700;
    cursor:pointer; transition:background .2s;
  }
  .card button:hover{ background:#145c3c; }
  .card button:disabled{ opacity:.6; cursor:not-allowed; }
  .sucesso{ display:none; text-align:center; padding:24px 0; }
  .sucesso .icone{ font-size:48px; margin-bottom:12px; }
  .sucesso h2{ margin:0 0 8px; color:#0a3622; }
  .sucesso p{ margin:0 0 20px; color:#4a5568; font-size:14px; }
  .erro-msg{
    background:#fff0f0; border:1px solid #ffc0c0; border-radius:8px;
    padding:10px 14px; font-size:13px; color:#cc0000; margin-bottom:14px; display:none;
  }
  .logo{ text-align:center; margin-bottom:16px; }
  .logo img{ height:40px; }
  .info{ font-size:11px; color:#8b93a1; text-align:center; margin-top:12px; }
  .info b{ color:#0a3622; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .topbar .nome{ font-size:13px; color:#0a3622; font-weight:700; }
  .topbar .sair{
    font-size:11px; color:#cc0000; cursor:pointer; border:none; background:none;
    text-decoration:underline; padding:0;
  }
</style>
</head>

    </div>
    <h1>Pré-Registro</h1>
    <p class="sub">Acesse com sua conta de motorista</p>
    <div class="erro-msg" id="erroLogin"></div>
    <form id="formLogin" onsubmit="fazerLogin(event)">
      <div class="campo">
        <label>Usuário</label>
        <input type="text" id="loginUsuario" placeholder="Seu usuário" required>
      </div>
      <div class="campo">
        <label>Senha</label>
        <input type="password" id="loginSenha" placeholder="Sua senha" required>
      </div>
      <button type="submit" id="btnLogin">Entrar</button>
    </form>
  </div>

  <div id="telaForm" style="display:none">
    <div class="topbar">
      <span class="nome" id="nomeMotorista">---</span>
      <button class="sair" onclick="sair()">Sair</button>
    </div>
    <h1>Pré-Registro</h1>
    <p class="sub">Preencha os dados do veículo</p>
    <div class="erro-msg" id="erroForm"></div>
    <form id="formPre" onsubmit="enviar(event)">
      <div class="campo">
        <label>Empresa *</label>
        <input type="text" id="empresa" list="listaEmpresas" placeholder="Nome da empresa" required>
        <datalist id="listaEmpresas"></datalist>
      </div>
      <div class="campo">
        <label>Placa do Veículo *</label>
        <input type="text" id="placa" placeholder="Ex.: ABC1D23" required style="text-transform:uppercase">
      </div>
      <div class="campo">
        <label>Modelo do Veículo</label>
        <select id="modelo">
          <option value="">Selecione</option>
          <option>1 - Utilitário</option>
          <option>2 - Toko</option>
          <option>3 - Guindaste</option>
          <option>4 - Munk</option>
          <option>5 - P. Reta</option>
          <option>6 - P. Baixa</option>
          <option>7 - Truck</option>
          <option>8 - Empilhadeira</option>
          <option>9 - Caminhão</option>
          <option>10 - Outros</option>
        </select>
      </div>
      <div class="campo">
        <label>Finalidade</label>
        <select id="finalidade">
          <option value="">Selecione</option>
          <option>1 - Coleta de material</option>
          <option>2 - Entrega de material</option>
          <option>3 - Coleta de Óleo</option>
          <option>4 - Coleta de sucata</option>
          <option>5 - Coleta de Resíduos</option>
        </select>
      </div>
      <div class="campo">
        <label>CNH</label>
        <input type="text" id="cnh" placeholder="Número da CNH">
      </div>
      <div class="campo">
        <label>Nota Fiscal / RT</label>
        <input type="text" id="nota" placeholder="Informe a nota fiscal / RT">
      </div>
      <div class="campo">
        <label>Observações</label>
        <input type="text" id="obs" placeholder="Informações adicionais">
      </div>
      <button type="submit" id="btnEnviar">Enviar Pré-Registro</button>
    </form>
  </div>

  <div class="sucesso" id="sucesso">
    <div class="icone">✅</div>
    <h2>Pré-registro enviado!</h2>
    <p>Seus dados já foram encaminhados para a portaria.<br>Apresente-se na chegada para confirmar.</p>
    <button onclick="resetar()">Novo Pré-Registro</button>
    <button onclick="sair()" style="background:#6c757d;margin-top:8px">Sair</button>
  </div>

</div>

<script>
const API = window.location.origin;

let tokenMotorista = localStorage.getItem('tokenMotorista');
let motoristaLogado = JSON.parse(localStorage.getItem('motoristaLogado') || 'null');

if(tokenMotorista && motoristaLogado){
  mostrarTelaForm();
}

function mostrarErro(id, msg){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = "block";
}
function ocultarErro(id){ document.getElementById(id).style.display = "none"; }

async function fazerLogin(e){
  e.preventDefault(); ocultarErro("erroLogin");
  const usuario = document.getElementById("loginUsuario").value.trim();
  const senha = document.getElementById("loginSenha").value;
  if(!usuario || !senha){ mostrarErro("erroLogin", "Preencha usuário e senha."); return; }
  const btn = document.getElementById("btnLogin");
  btn.disabled = true; btn.textContent = "Entrando...";
  try {
    const res = await fetch(API + '/api/login-motorista', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, senha })
    });
    if(!res.ok){ const err = await res.json(); mostrarErro("erroLogin", err.erro || "Erro ao entrar"); btn.disabled = false; btn.textContent = "Entrar"; return; }
    const data = await res.json();
    tokenMotorista = data.token;
    motoristaLogado = data.motorista;
    localStorage.setItem('tokenMotorista', tokenMotorista);
    localStorage.setItem('motoristaLogado', JSON.stringify(motoristaLogado));
    document.getElementById("formLogin").reset();
    btn.disabled = false; btn.textContent = "Entrar";
    mostrarTelaForm();
  } catch { mostrarErro("erroLogin", "Erro de conexão"); btn.disabled = false; btn.textContent = "Entrar"; }
}

function mostrarTelaForm(){
  document.getElementById("telaLogin").style.display = "none";
  document.getElementById("telaForm").style.display = "block";
  document.getElementById("sucesso").style.display = "none";
  document.getElementById("nomeMotorista").textContent = motoristaLogado?.nome || "Motorista";
  carregarEmpresas();
}

async function carregarEmpresas(){
  try {
    const res = await fetch(API + '/api/empresas-lista-pre');
    if(!res.ok) return;
    const lista = await res.json();
    const dl = document.getElementById("listaEmpresas");
    dl.innerHTML = lista.map(e => `<option value="${e.empresa}">`).join("");
  } catch {}
}

function sair(){
  tokenMotorista = null;
  motoristaLogado = null;
  localStorage.removeItem('tokenMotorista');
  localStorage.removeItem('motoristaLogado');
  document.getElementById("telaLogin").style.display = "block";
  document.getElementById("telaForm").style.display = "none";
  document.getElementById("sucesso").style.display = "none";
  document.getElementById("formLogin").reset();
}

async function enviar(e){
  e.preventDefault(); ocultarErro("erroForm");
  const empresa = document.getElementById("empresa").value.trim().toUpperCase();
  const placa = document.getElementById("placa").value.trim().toUpperCase();
  if(!empresa){ mostrarErro("erroForm", "Informe a empresa."); return; }
  if(!placa){ mostrarErro("erroForm", "Informe a placa."); return; }
  const btn = document.getElementById("btnEnviar");
  btn.disabled = true; btn.textContent = "Enviando...";
  const payload = {
    empresa,
    motorista: motoristaLogado.nome,
    cnh: document.getElementById("cnh").value.trim(),
    placa,
    modelo: document.getElementById("modelo").value,
    finalidade: document.getElementById("finalidade").value,
    nota: document.getElementById("nota").value.trim(),
    obs: document.getElementById("obs").value.trim()
  };
  try {
    const res = await fetch(API + '/api/pre-registro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tokenMotorista },
      body: JSON.stringify(payload)
    });
    if(!res.ok){ const err = await res.json(); mostrarErro("erroForm", err.erro || "Erro ao enviar"); btn.disabled = false; btn.textContent = "Enviar Pré-Registro"; return; }
    document.getElementById("formPre").style.display = "none";
    document.getElementById("sucesso").style.display = "block";
    btn.disabled = false; btn.textContent = "Enviar Pré-Registro";
  } catch { mostrarErro("erroForm", "Erro de conexão"); btn.disabled = false; btn.textContent = "Enviar Pré-Registro"; }
}

function resetar(){
  document.getElementById("formPre").reset();
  document.getElementById("formPre").style.display = "block";
  document.getElementById("sucesso").style.display = "none";
  document.getElementById("btnEnviar").disabled = false;
  document.getElementById("btnEnviar").textContent = "Enviar Pré-Registro";
}

document.getElementById("placa").addEventListener("input", function(){ this.value = this.value.toUpperCase(); });
</script>
</body>
</html>
