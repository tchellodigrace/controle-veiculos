<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Guarita & Checklist SMS</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-gray-100 p-6 min-h-screen">

    <div class="max-w-4xl mx-auto bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl">
        <header class="border-b border-slate-700 pb-4 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-blue-400">Portaria 4.0 - Recepção & SMS</h1>
                <p class="text-xs text-gray-400">Validação de entrada e inspeção de segurança offshore</p>
            </div>
            <span class="bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1 rounded-full border border-emerald-500/20 font-semibold">Base Ativa</span>
        </header>

        <form id="checkinForm" onsubmit="registrarEntrada(event)" class="space-y-6">
            <!-- Bloco 1: Dados do Veículo / Motorista -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                <div>
                    <label class="block text-xs font-semibold text-gray-400">Placa do Veículo</label>
                    <input type="text" id="placa" required class="w-full mt-1 p-2 bg-slate-800 border border-slate-600 rounded text-sm text-white focus:border-blue-500 uppercase">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400">Motorista</label>
                    <input type="text" id="motorista" required class="w-full mt-1 p-2 bg-slate-800 border border-slate-600 rounded text-sm text-white focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400">Nota Fiscal / RT</label>
                    <input type="text" id="notaFiscal" required class="w-full mt-1 p-2 bg-slate-800 border border-slate-600 rounded text-sm text-white focus:border-blue-500">
                </div>
            </div>

            <!-- Bloco 2: Checklist de SMS (Saúde, Meio Ambiente e Segurança) -->
            <div>
                <h2 class="text-sm font-bold text-amber-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    Checklist Obrigatório de SMS
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
                    <label class="flex items-center space-x-3 p-3 bg-slate-900/40 rounded border border-slate-700 hover:border-slate-600 cursor-pointer">
                        <input type="checkbox" id="sms_epi" class="w-4 h-4 text-blue-600 rounded bg-slate-800 border-slate-600 focus:ring-0">
                        <span>Motorista com EPI completo (Bota, Capacete, Óculos)</span>
                    </label>

                    <label class="flex items-center space-x-3 p-3 bg-slate-900/40 rounded border border-slate-700 hover:border-slate-600 cursor-pointer">
                        <input type="checkbox" id="sms_integracao" class="w-4 h-4 text-blue-600 rounded bg-slate-800 border-slate-600 focus:ring-0">
                        <span>Integração de SMS da Base em dia</span>
                    </label>

                    <label class="flex items-center space-x-3 p-3 bg-slate-900/40 rounded border border-slate-700 hover:border-slate-600 cursor-pointer">
                        <input type="checkbox" id="sms_extintor" class="w-4 h-4 text-blue-600 rounded bg-slate-800 border-slate-600 focus:ring-0">
                        <span>Extintor de incêndio do veículo no prazo</span>
                    </label>

                    <label class="flex items-center space-x-3 p-3 bg-slate-900/40 rounded border border-slate-700 hover:border-slate-600 cursor-pointer">
                        <input type="checkbox" id="sms_vazamento" class="w-4 h-4 text-blue-600 rounded bg-slate-800 border-slate-600 focus:ring-0">
                        <span>Ausência de vazamento visível de óleo/fluídos</span>
                    </label>
                </div>
            </div>

            <!-- Bloco 3: Destino e Liberação -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                <div>
                    <label class="block text-xs font-semibold text-gray-400">Posição / Vaga no Pátio</label>
                    <select id="posicaoPatio" required class="w-full mt-1 p-2 bg-slate-800 border border-slate-600 rounded text-sm text-white">
                        <option value="">Selecione o local...</option>
                        <option value="Vaga 01 - Almoxarifado Central">Vaga 01 - Almoxarifado Central</option>
                        <option value="Vaga 02 - Pátio de Tubos">Vaga 02 - Pátio de Tubos</option>
                        <option value="Vaga 03 - Galpão Químico">Vaga 03 - Galpão Químico</option>
                        <option value="Aguardando no Acostamento">Aguardando no Acostamento (Pátio Cheio)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400">Horário de Chegada</label>
                    <input type="text" id="horaEntrada" readonly class="w-full mt-1 p-2 bg-slate-900 border border-slate-700 rounded text-sm text-gray-400 font-mono">
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg shadow-lg transition duration-200 uppercase tracking-wider text-sm">
                Aprovar SMS e Registrar Entrada
            </button>
        </form>
    </div>

    <script>
        // Preenche o horário atual no campo
        function atualizarHora() {
            const agora = new Date();
            document.getElementById('horaEntrada').value = agora.toLocaleTimeString('pt-BR');
        }
        setInterval(atualizarHora, 1000);
        atualizarHora();

        function registrarEntrada(event) {
            event.preventDefault();

            // Validação estrita de SMS
            const epiOk = document.getElementById('sms_epi').checked;
            const integracaoOk = document.getElementById('sms_integracao').checked;

            if (!epiOk || !integracaoOk) {
                alert('BLOQUEIO DE SEGURANÇA: O veículo não pode entrar sem EPI completo e Integração de SMS válida!');
                return;
            }

            const registroEntrada = {
                placa: document.getElementById('placa').value,
                motorista: document.getElementById('motorista').value,
                notaFiscal: document.getElementById('notaFiscal').value,
                vaga: document.getElementById('posicaoPatio').value,
                horaEntrada: document.getElementById('horaEntrada').value,
                smsCheck: {
                    epi: epiOk,
                    integracao: integracaoOk,
                    extintor: document.getElementById('sms_extintor').checked,
                    vazamento: document.getElementById('sms_vazamento').checked
                }
            };

            console.log('Registro enviado para o banco de dados:', registroEntrada);
            alert(`ENTRADA LIBERADA!\nVeículo direcionado para: ${registroEntrada.vaga}`);
            document.getElementById('checkinForm').reset();
            atualizarHora();
        }
    </script>
</body>
</html>
